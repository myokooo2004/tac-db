name: Convert XLSX to JSON
on:
  push:
    paths:
      - 'tac_full.xlsx'
  workflow_dispatch:

jobs:
  convert:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      
      - name: Install Python deps
        run: pip install openpyxl

      - name: Convert to JSON
        run: |
          python3 << 'EOF'
          import openpyxl, json
          wb = openpyxl.load_workbook('tac_full.xlsx', read_only=True)
          result = {}
          for ws in wb.worksheets:
              for row in ws.iter_rows(min_row=2, values_only=True):
                  tac = str(row[0]).strip() if row[0] else None
                  brand = str(row[1]).strip() if row[1] else ""
                  model = str(row[2]).strip() if row[2] else ""
                  if tac and len(tac) == 8:
                      result[tac] = {"brand": brand, "model": model}
          with open('tac.json', 'w') as f:
              json.dump(result, f, separators=(',', ':'))
          print(f"Total: {len(result)} entries")
          EOF

      - name: Commit JSON
        run: |
          git config user.name "github-actions"
          git config user.email "actions@github.com"
          git add tac.json
          git commit -m "Auto-generate tac.json" || echo "No changes"
          git push
