name: Convert XLSX to JSON
on:
  push:
    paths:
      - 'tac_full.xlsx'
  workflow_dispatch:

permissions:
  contents: write

jobs:
  convert:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install Python deps
        run: pip install openpyxl pandas

      - name: Convert to JSON
        run: |
          python3 << 'EOF'
          import pandas as pd, json
          df = pd.read_excel('tac_full.xlsx', dtype={'TAC': str})
          result = {}
          for _, row in df.iterrows():
              tac = str(row['TAC']).strip().zfill(8)
              brand = str(row['Brand']).strip() if pd.notna(row['Brand']) else ""
              specs = str(row['SPECS']).strip() if pd.notna(row['SPECS']) else ""
              model = specs.split(',')[0].strip() if specs else ""
              if tac and len(tac) == 8 and tac.isdigit():
                  result[tac] = {"brand": brand, "model": model}
          with open('tac.json', 'w') as f:
              json.dump(result, f, separators=(',', ':'))
          print(f"Total: {len(result)} entries")
          EOF

      - name: Commit JSON
        run: |
          git config user.name "github-actions"
          git config user.email "actions@github.com"
          git add tac.json
          git commit -m "Auto-generate tac.json" || echo "No changes"
          git push
